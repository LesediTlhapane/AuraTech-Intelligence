
<!DOCTYPE html>
<html lang="en">
  <head>

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', 'Space Grotesk', sans-serif;
        background-color: #0a0f1f;
        scroll-behavior: smooth;
      }

      /* Animated gradient background for hero */
      .hero-glow {
        background: radial-gradient(ellipse at 30% 40%, rgba(0, 180, 255, 0.12), rgba(2, 20, 45, 0.96));
        position: relative;
      }
      .hero-glow::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 70% 20%, rgba(0, 212, 255, 0.08), transparent 70%);
        pointer-events: none;
      }

      .animated-gradient-text {
        background: linear-gradient(135deg, #FFFFFF 20%, #2A9DF4 50%, #00D4FF 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: shimmer 3s infinite linear;
      }

      @keyframes shimmer {
        0% { background-position: 0% 50%; }
        100% { background-position: 100% 50%; }
      }

      .card-hover {
        transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      }
      .card-hover:hover {
        transform: translateY(-10px);
        box-shadow: 0 25px 40px -12px rgba(0, 180, 255, 0.3);
        border-color: rgba(0, 200, 255, 0.7);
        background: linear-gradient(145deg, #111d38, #0c142c);
      }

      .nav-blur {
        backdrop-filter: blur(16px);
        background: rgba(5, 10, 25, 0.88);
        border-bottom: 1px solid rgba(0, 150, 255, 0.3);
      }

      .pricing-popular {
        border: 1px solid #2A9DF4;
        box-shadow: 0 0 20px rgba(0, 150, 255, 0.35);
        transform: scale(1.02);
        background: linear-gradient(145deg, #0e1a2f, #091020);
      }

      .btn-glow {
        transition: all 0.2s ease;
      }
      .btn-glow:hover {
        box-shadow: 0 0 16px #00aeff;
        background: #0077cc;
        transform: translateY(-2px);
      }

      input, textarea {
        transition: 0.2s;
      }
      input:focus, textarea:focus {
        border-color: #2A9DF4;
        box-shadow: 0 0 0 3px rgba(42, 157, 244, 0.2);
        outline: none;
      }

      /* Chat widget styles */
      .chat-widget {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 1000;
      }
      .chat-button {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #2A9DF4, #00b4ff);
        box-shadow: 0 4px 20px rgba(0, 180, 255, 0.5);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
      }
      .chat-button:hover {
        transform: scale(1.08);
        box-shadow: 0 6px 28px rgba(0, 180, 255, 0.7);
      }
      .chat-window {
        position: absolute;
        bottom: 80px;
        right: 0;
        width: 380px;
        height: 520px;
        background: #0f1a2e;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid rgba(42, 157, 244, 0.4);
        backdrop-filter: blur(8px);
      }
      .chat-header {
        background: linear-gradient(135deg, #0a1128, #0d1835);
        padding: 16px;
        color: white;
        font-weight: bold;
        border-bottom: 1px solid #2A9DF4;
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .message-bot {
        background: #1e2a48;
        padding: 10px 14px;
        border-radius: 18px;
        border-bottom-left-radius: 4px;
        max-width: 85%;
        color: #e0e0e0;
        font-size: 14px;
        align-self: flex-start;
        white-space: pre-wrap;
        line-height: 1.5;
      }
      .message-user {
        background: #2A9DF4;
        padding: 10px 14px;
        border-radius: 18px;
        border-bottom-right-radius: 4px;
        max-width: 85%;
        color: white;
        font-size: 14px;
        align-self: flex-end;
      }
      .chat-input-area {
        display: flex;
        padding: 12px;
        gap: 8px;
        border-top: 1px solid #2a3a60;
        background: #0a1128;
      }
      .chat-input-area input {
        flex: 1;
        background: #1e2a48;
        border: none;
        border-radius: 24px;
        padding: 10px 16px;
        color: white;
        outline: none;
      }
      .chat-input-area button {
        background: #2A9DF4;
        border: none;
        border-radius: 24px;
        padding: 8px 18px;
        color: white;
        cursor: pointer;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0b1120;
      }
      ::-webkit-scrollbar-thumb {
        background: #2A9DF4;
        border-radius: 8px;
      }
      .typing-indicator {
        display: inline-flex;
        gap: 4px;
        align-items: center;
      }
      .typing-indicator span {
        width: 6px;
        height: 6px;
        background: #aaa;
        border-radius: 50%;
        animation: blink 1.4s infinite;
      }
      .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
      .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes blink {
        0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
        30% { opacity: 1; transform: translateY(-4px); }
      }
    </style>
  </head>
  <body class="text-gray-200">
    <div id="root"></div>

      // Header Component
      const Header = () => {
        const [isScrolled, setIsScrolled] = useState(false);

          const handleScroll = () => setIsScrolled(window.scrollY > 20);

          return () => window.removeEventListener("scroll", handleScroll);

        const handleSmooth = (e, href) => {
          e.preventDefault();
          const targetId = href.replace("#", "");
          const element = document.getElementById(targetId);

        return (
          <nav className={`fixed top-0 left-0 w-full z-50 transition-all duration-300 ${isScrolled ? 'nav-blur shadow-lg' : 'bg-transparent'}`}>

      // Hero Section

      // AI Agents Section
      const Agents = () => (

          <div className="max-w-7xl mx-auto">

              <div className="w-24 h-1 bg-gradient-to-r from-blue-400 to-cyan-500 mx-auto mt-4 rounded-full"></div>

      // INTELLIGENT CHAT WIDGET - Fully updated with proper responses
      const AIChatWidget = () => {
        const [isOpen, setIsOpen] = useState(false);
        const [messages, setMessages] = useState([{ 
          role: "bot", 
          content: "👋 Hi! I'm Aura Assistant — an AI agent built by Lesedi. Ask me about our AI agents (Customer Experience, Operations, Knowledge Brain), pricing, or how we can automate your business!"

        const [input, setInput] = useState("");
        const [isTyping, setIsTyping] = useState(false);
        const messagesEndRef = useRef(null);

        const scrollToBottom = () => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });

        useEffect(() => {
          scrollToBottom();
        }, [messages]);

        // Intelligent response system
        const getBotResponse = (userMessage) => {
          const msg = userMessage.toLowerCase();
          
          // Services / Agents offered
          if (msg.match(/services|offer|do you do|what can you|agents|solutions|what do you provide|what services/i)) {

                   "• **AI Scoping & Consultation** — From R3,500 (process audit + automation blueprint)\n" +
                   "• **Custom Agent Build** — Project-based pricing (tailored to your specific workflow)\n" +

                   "Want a free custom quote? Share your email in the contact form and Lesedi will send a detailed proposal within 24 hours!";
          }
          
          // About Lesedi / Founder
          else if (msg.match(/lesedi|founder|who are you|about you|specialist|background|owner|your name/i)) {
            return "🧠 **Lesedi Tlhapane** is an AI Technical Specialist based in Pretoria, South Africa.\n\n" +
                   "He was selected for the **eStudy AI Entrepreneurship Incubation Programme** — a 12-month sponsored journey building commercially viable AI agents. Lesedi retains full IP rights and has deployed production-ready automation for real clients across multiple industries.\n\n" +
                   "His mission: help South African businesses harness autonomous AI systems that handle repetitive cognitive work.";
          }
          
          // Chatbot specific
          else if (msg.match(/chatbot|chat bot|conversational|ai chat|live chat/i)) {
            return "💬 Great question! Our **Customer Experience Agent** is exactly what you're asking about — it's an advanced AI chatbot that:\n\n" +
                   "• Answers complex customer questions 24/7\n" +
                   "• Resolves support tickets autonomously\n" +
                   "• Books appointments and qualifies leads\n" +
                   "• Integrates with WhatsApp, website, and social media\n\n" +
                   "Want to see a demo? Click 'Free AI Audit' on the homepage!";
          }
          
          // Document / Admin automation
          else if (msg.match(/document|admin|invoice|pdf|extract|data entry|paperwork|automate paperwork|ocr/i)) {
            return "📄 Our **Operations & Admin Agent** specializes in:\n\n" +
                   "• Extracting data from invoices, receipts, and forms\n" +
                   "• Monitoring email inboxes for attachments\n" +
                   "• Auto-updating CRMs and spreadsheets\n" +
                   "• Routing documents to the right team members\n\n" +
                   "Businesses typically save 10-20 hours per week on manual data entry. Want to calculate your potential savings?";
          }
          
          // Knowledge base
          else if (msg.match(/knowledge|internal|training|manual|employee|staff|wiki|company data|documents|learn/i)) {
            return "🧠 The **Knowledge Base Brain** is perfect for:\n\n" +
                   "• Training new employees (they can ask questions instead of reading manuals)\n" +
                   "• Compliance teams needing instant policy answers\n" +
                   "• Support teams accessing product documentation\n" +
                   "• Sales teams finding technical specs quickly\n\n" +
                   "We train the AI exclusively on YOUR files — nothing leaves your control.";

          // eStudy program

        const handleSend = async () => {

          const userMsg = { role: "user", content: input };
          setMessages(prev => [...prev, userMsg]);
          const userQuestion = input;
          setInput("");
          setIsTyping(true);
          
          setTimeout(() => {
            const botReply = getBotResponse(userQuestion);
            setMessages(prev => [...prev, { role: "bot", content: botReply }]);
