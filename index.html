
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Aura Tech Intelligence | AI Solutions for South African Businesses</title>
    <!-- Google Fonts: Space Grotesk + Inter fallback -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Tailwind CSS via CDN (v3) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', 'Space Grotesk', sans-serif;
        background-color: #0a0f1f;
        scroll-behavior: smooth;
      }

      /* Custom neon glow / gradient animations */
      .glow-bg {
        background: radial-gradient(circle at 20% 30%, rgba(0, 180, 255, 0.15), rgba(2, 20, 45, 0.95));
        position: relative;
        z-index: 0;
      }

      .glow-bg::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(ellipse at 70% 40%, rgba(0, 230, 255, 0.08), transparent 70%);
        pointer-events: none;
        z-index: 1;
      }

      .animated-gradient-text {
        background: linear-gradient(135deg, #FFFFFF 20%, #2A9DF4 60%, #00D4FF 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: shimmer 3s infinite linear;
      }

      @keyframes shimmer {
        0% { background-position: 0% 50%; }
        100% { background-position: 100% 50%; }
      }

      .card-hover {
        transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      }
      .card-hover:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 35px -12px rgba(0, 180, 255, 0.25);
        border-color: rgba(0, 200, 255, 0.6);
        background: rgba(15, 25, 50, 0.9);
      }

      .nav-blur {
        backdrop-filter: blur(16px);
        background: rgba(5, 10, 25, 0.85);
        border-bottom: 1px solid rgba(0, 150, 255, 0.3);
      }

      .pricing-popular {
        border: 1px solid #2A9DF4;
        box-shadow: 0 0 15px rgba(0, 150, 255, 0.3);
        transform: scale(1.02);
        background: linear-gradient(145deg, #0e1a2f, #091020);
      }

      .btn-glow {
        transition: all 0.2s ease;
      }
      .btn-glow:hover {
        box-shadow: 0 0 14px #00aeff;
        background: #0077cc;
      }

      input, textarea {
        transition: 0.2s;
      }
      input:focus, textarea:focus {
        border-color: #2A9DF4;
        box-shadow: 0 0 0 3px rgba(42, 157, 244, 0.2);
        outline: none;
      }

      /* custom scroll */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0b1120;
      }
      ::-webkit-scrollbar-thumb {
        background: #2A9DF4;
        border-radius: 8px;
      }
    </style>
  </head>
  <body class="text-gray-200">

    <div id="root"></div>

    <!-- React & ReactDOM CDN (no external beyond artifact env) -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <!-- Babel standalone for JSX -->
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      // ------ REACT COMPONENTS -------
      const { useState, useEffect } = React;

      // Navigation links
      const navLinks = [
        { name: "Home", href: "#home" },
        { name: "Services", href: "#services" },
        { name: "About", href: "#about" },
        { name: "Pricing", href: "#pricing" },
        { name: "Contact", href: "#contact" }
      ];

      // Service data
      const servicesData = [
        { id: 1, icon: "fa-robot", title: "AI Chatbot Solutions", desc: "Smart, conversational AI for customer support & lead generation, 24/7 automated." },
        { id: 2, icon: "fa-file-alt", title: "Document & Admin Automation", desc: "Intelligent OCR, data extraction, and workflow automation for back-office." },
        { id: 3, icon: "fa-chart-line", title: "AI Business Analytics", desc: "Predictive insights & real-time dashboards for data-driven decisions." },
        { id: 4, icon: "fa-graduation-cap", title: "EdTech AI Tools", desc: "Personalized learning, automated assessments & smart tutoring systems." },
        { id: 5, icon: "fa-users", title: "AI Recruitment & HR Tools", desc: "Smart resume screening, candidate matching & employee retention analytics." }
      ];

      const pricingPlans = [
        {
          name: "Starter",
          price: "From R5,000",
          features: ["1 AI integration", "Basic chatbot setup", "Email support", "2-hour consultation"],
          popular: false,
          cta: "Get Starter"
        },
        {
          name: "Professional",
          price: "From R12,500",
          features: ["5 AI automations", "Advanced analytics", "Priority support", "Custom model tuning", "Monthly strategy call"],
          popular: true,
          cta: "Start Now"
        },
        {
          name: "Enterprise",
          price: "Custom Quote",
          features: ["Unlimited AI solutions", "Dedicated AI specialist", "SLA 99.9% uptime", "On-premise/cloud", "White-glove onboarding"],
          popular: false,
          cta: "Contact Us"
        }
      ];

      // Header Component with sticky nav
      const Header = () => {
        const [isScrolled, setIsScrolled] = useState(false);
        useEffect(() => {
          const handleScroll = () => setIsScrolled(window.scrollY > 20);
          window.addEventListener("scroll", handleScroll);
          return () => window.removeEventListener("scroll", handleScroll);
        }, []);
        const handleSmooth = (e, href) => {
          e.preventDefault();
          const targetId = href.replace("#", "");
          const element = document.getElementById(targetId);
          if (element) {
            element.scrollIntoView({ behavior: "smooth", block: "start" });
          }
        };
        return (
          <nav className={`fixed top-0 left-0 w-full z-50 transition-all duration-300 ${isScrolled ? 'nav-blur shadow-lg' : 'bg-transparent'}`}>
            <div className="max-w-7xl mx-auto px-6 md:px-10 py-4 flex justify-between items-center flex-wrap">
              <div className="flex items-center space-x-2">
                <i className="fas fa-brain text-electric-blue text-3xl" style={{ color: "#2A9DF4" }}></i>
                <span className="font-space-grotesk text-xl font-bold tracking-tight bg-gradient-to-r from-white to-blue-300 bg-clip-text text-transparent">Aura Tech Intelligence</span>
              </div>
              <div className="hidden md:flex space-x-8 text-sm font-medium">
                {navLinks.map(link => (
                  <a key={link.name} href={link.href} onClick={(e) => handleSmooth(e, link.href)} className="hover:text-[#2A9DF4] transition-colors duration-200 relative after:absolute after:bottom-[-4px] after:left-0 after:w-0 after:h-[2px] after:bg-[#2A9DF4] after:transition-all hover:after:w-full">{link.name}</a>
                ))}
              </div>
              <div className="md:hidden">
                <details className="dropdown">
                  <summary className="list-none cursor-pointer text-2xl"><i className="fas fa-bars text-white"></i></summary>
                  <div className="absolute right-4 mt-2 bg-[#0e172a] rounded-xl p-3 w-40 flex flex-col gap-2 shadow-xl border border-blue-900/40 z-50">
                    {navLinks.map(link => (
                      <a key={link.name} href={link.href} onClick={(e) => handleSmooth(e, link.href)} className="block px-3 py-2 hover:bg-[#1e2a4a] rounded-lg">{link.name}</a>
                    ))}
                  </div>
                </details>
              </div>
            </div>
          </nav>
        );
      };

      // Hero Section
      const Hero = () => (
        <section id="home" className="relative min-h-screen flex items-center justify-center overflow-hidden pt-24 glow-bg">
          <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MCIgaGVpZ2h0PSI4MCIgdmlld0JveD0iMCAwIDQwIDQwIj48cGF0aCBmaWxsPSIjMjA5OGZmIiBmaWxsLW9wYWNpdHk9IjAuMDQiIGQ9Ik0wIDBoNDB2NDBIMHoiLz48Y2lyY2xlIGN4PSIyMCIgY3k9IjIwIiByPSIxIiBmaWxsPSIjMjhhY2ZmIiBmaWxsLW9wYWNpdHk9IjAuMiIvPjwvc3ZnPg==')] opacity-20"></div>
          <div className="relative z-10 max-w-6xl mx-auto px-6 text-center">
            <div className="inline-block mb-4 px-4 py-1.5 rounded-full bg-blue-500/10 border border-blue-400/30 text-sm font-mono">
              <i className="fas fa-microchip mr-2 text-cyan-400"></i> Based in Pretoria, South Africa
            </div>
            <h1 className="text-5xl md:text-7xl font-bold font-space-grotesk leading-tight">
              Intelligent Solutions. <span className="animated-gradient-text">Real Results.</span>
            </h1>
            <p className="text-xl md:text-2xl text-gray-300 max-w-3xl mx-auto mt-6">
              AI automation tailored for South African businesses — boost efficiency, reduce costs, and scale smartly.
            </p>
            <div className="mt-8 flex flex-wrap justify-center gap-5">
              <a href="#contact" className="bg-[#2A9DF4] hover:bg-[#1f7bc0] text-white px-8 py-4 rounded-xl font-semibold transition-all shadow-lg shadow-blue-500/30 flex items-center gap-2 btn-glow"><i className="fas fa-calendar-check"></i> Get a Free Consultation</a>
              <a href="#services" className="border border-blue-500 text-white px-8 py-4 rounded-xl font-medium hover:bg-white/10 transition">Explore Services <i className="fas fa-arrow-right ml-1"></i></a>
            </div>
            <p className="mt-10 text-gray-400 text-sm">⚡ Trusted AI Technical Specialist | eStudy AI Incubation Alumni</p>
          </div>
          <div className="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-[#0a0f1f] to-transparent pointer-events-none"></div>
        </section>
      );

      // Services Section (5 cards)
      const Services = () => (
        <section id="services" className="py-24 px-6 bg-[#0c1222]">
          <div className="max-w-7xl mx-auto">
            <div className="text-center mb-14">
              <h2 className="text-4xl md:text-5xl font-bold font-space-grotesk"><span className="text-[#2A9DF4]">AI-Powered</span> Services</h2>
              <div className="w-24 h-1 bg-gradient-to-r from-blue-400 to-cyan-500 mx-auto mt-4 rounded-full"></div>
              <p className="text-gray-300 mt-4 max-w-2xl mx-auto">End-to-end AI automation solutions crafted for African industries.</p>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6">
              {servicesData.map(service => (
                <div key={service.id} className="bg-[#0f182c] border border-gray-800 rounded-2xl p-6 card-hover transition-all duration-300 backdrop-blur-sm">
                  <div className="text-4xl text-[#2A9DF4] mb-4"><i className={`fas ${service.icon}`}></i></div>
                  <h3 className="text-xl font-bold mb-2">{service.title}</h3>
                  <p className="text-gray-400 text-sm leading-relaxed">{service.desc}</p>
                </div>
              ))}
            </div>
          </div>
        </section>
      );

      // About Me (founder + eStudy incubation)
      const About = () => (
        <section id="about" className="py-24 px-6 bg-gradient-to-br from-[#0a1022] to-[#0d1428]">
          <div className="max-w-6xl mx-auto flex flex-col md:flex-row gap-12 items-center">
            <div className="md:w-1/3 flex justify-center">
              <div className="relative w-64 h-64 md:w-72 md:h-72 rounded-full bg-gradient-to-tr from-blue-500 to-cyan-400 p-1 shadow-2xl">
                <div className="w-full h-full rounded-full bg-[#111c30] flex items-center justify-center overflow-hidden border-4 border-white/10">
                  <i className="fas fa-user-circle text-8xl text-gray-300"></i>
                  {/* placeholder for profile photo */}
                </div>
              </div>
            </div>
            <div className="md:w-2/3 space-y-5">
              <div className="inline-block px-4 py-1 rounded-full bg-blue-500/20 text-blue-300 text-sm font-mono"><i className="fas fa-map-marker-alt mr-1"></i> Pretoria, South Africa</div>
              <h2 className="text-4xl font-bold font-space-grotesk">Lesedi Tlhapane <span className="text-[#2A9DF4]">| AI Technical Specialist</span></h2>
              <p className="text-gray-300 text-lg leading-relaxed">
                As an entrepreneurially-driven AI specialist, I combine deep technical expertise with business acumen. I was selected for the <strong className="text-white">eStudy AI Entrepreneurship Incubation Programme</strong> — a 12-month sponsored journey building real AI solutions, retaining IP rights, and transitioning into an independent AI business owner.
              </p>
              <p className="text-gray-300">
                My mission: empower South African businesses with bespoke AI automation, from intelligent chatbots to predictive analytics. Based in Pretoria, I work with startups, SMEs, and corporations to turn data into competitive advantage.
              </p>
              <div className="flex gap-4 pt-3">
                <span className="bg-[#1e2a48] px-4 py-2 rounded-full text-sm flex items-center gap-2"><i className="fab fa-linkedin text-blue-400"></i> /lesedi-tlhapane</span>
                <span className="bg-[#1e2a48] px-4 py-2 rounded-full text-sm flex items-center gap-2"><i className="fab fa-github"></i> aura-ai-labs</span>
              </div>
            </div>
          </div>
        </section>
      );

      // Pricing Component
      const Pricing = () => (
        <section id="pricing" className="py-24 px-6 bg-[#0a0f1f]">
          <div className="max-w-7xl mx-auto">
            <div className="text-center mb-12">
              <h2 className="text-4xl md:text-5xl font-bold">Simple, <span className="text-[#2A9DF4]">Transparent</span> Pricing</h2>
              <p className="text-gray-400 mt-3">Choose a plan that scales with your AI ambitions</p>
            </div>
            <div className="grid md:grid-cols-3 gap-8 items-stretch">
              {pricingPlans.map((plan, idx) => (
                <div key={idx} className={`rounded-2xl p-7 transition-all duration-300 flex flex-col h-full ${plan.popular ? 'pricing-popular relative border-2 border-cyan-500/70 bg-gradient-to-b from-[#0f1a2f] to-[#0a1022]' : 'border border-gray-800 bg-[#0e1628]'} hover:shadow-2xl`}>
                  {plan.popular && <div className="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-cyan-500 text-black text-xs font-bold px-4 py-1 rounded-full"><i className="fas fa-star mr-1"></i> Most Popular</div>}
                  <div className="mb-6">
                    <h3 className="text-2xl font-bold">{plan.name}</h3>
                    <div className="text-3xl font-extrabold mt-3 text-white">{plan.price}</div>
                    <div className="h-px bg-gray-700 my-5"></div>
                    <ul className="space-y-3 text-gray-300 text-sm">
                      {plan.features.map((feat, i) => (
                        <li key={i} className="flex items-center gap-2"><i className="fas fa-check-circle text-cyan-400 text-sm"></i> {feat}</li>
                      ))}
                    </ul>
                  </div>
                  <div className="mt-auto pt-6">
                    <a href="#contact" className={`block text-center py-3 rounded-xl font-semibold transition ${plan.popular ? 'bg-[#2A9DF4] hover:bg-blue-600 text-white shadow-md' : 'border border-blue-500 text-white hover:bg-blue-500/20'}`}>{plan.cta}</a>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );

      // Contact Form + info
      const Contact = () => {
        const [formData, setFormData] = useState({ name: "", email: "", phone: "", message: "" });
        const [submitted, setSubmitted] = useState(false);
        const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });
        const handleSubmit = (e) => {
          e.preventDefault();
          // simulate form send (no backend)
          console.log("Consultation request:", formData);
          setSubmitted(true);
          setTimeout(() => setSubmitted(false), 4000);
          setFormData({ name: "", email: "", phone: "", message: "" });
        };
        return (
          <section id="contact" className="py-24 px-6 bg-gradient-to-b from-[#0c1224] to-[#080e1c]">
            <div className="max-w-6xl mx-auto">
              <div className="text-center mb-12">
                <h2 className="text-4xl font-bold">Let's <span className="text-[#2A9DF4]">Connect</span></h2>
                <p className="text-gray-400 mt-2">Ready to transform your business with AI? Reach out.</p>
              </div>
              <div className="flex flex-col lg:flex-row gap-12">
                <div className="lg:w-1/2 space-y-6">
                  <div className="bg-[#0f182c] p-6 rounded-2xl border border-blue-900/40">
                    <div className="flex items-center gap-4 text-xl">
                      <i className="fab fa-whatsapp text-3xl text-green-400"></i> <span className="font-medium">+27 82 123 4567</span>
                    </div>
                    <div className="flex items-center gap-4 mt-4 text-xl">
                      <i className="fab fa-linkedin text-3xl text-sky-400"></i> <span>linkedin.com/in/aura-tech-intel</span>
                    </div>
                    <div className="flex items-center gap-4 mt-4 text-xl">
                      <i className="fas fa-envelope text-3xl text-blue-300"></i> <span>hello@auratechintelligence.co.za</span>
                    </div>
                    <div className="mt-6 pt-4 border-t border-gray-700 flex items-center gap-2"><i className="fas fa-map-pin text-blue-400"></i> Pretoria, Gauteng, South Africa</div>
                  </div>
                  <div className="bg-[#0a1122] p-5 rounded-xl border border-blue-800/30">
                    <p className="italic text-gray-300 text-sm">"From the eStudy AI Incubation programme, I’ve built production-ready AI tools. Now I help businesses do the same." — Lesedi Tlhapane</p>
                  </div>
                </div>
                <div className="lg:w-1/2">
                  <form onSubmit={handleSubmit} className="bg-[#0f182c] p-7 rounded-2xl border border-gray-800 shadow-2xl">
                    <div className="grid grid-cols-1 gap-5">
                      <div>
                        <label className="block text-sm font-medium mb-1">Full Name</label>
                        <input type="text" name="name" required value={formData.name} onChange={handleChange} className="w-full bg-[#0a1122] border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-blue-400" placeholder="Lesedi Tlhapane" />
                      </div>
                      <div>
                        <label className="block text-sm font-medium mb-1">Email Address</label>
                        <input type="email" name="email" required value={formData.email} onChange={handleChange} className="w-full bg-[#0a1122] border border-gray-700 rounded-lg px-4 py-3 text-white" placeholder="hello@business.co.za" />
                      </div>
                      <div>
                        <label className="block text-sm font-medium mb-1">Phone Number</label>
                        <input type="tel" name="phone" value={formData.phone} onChange={handleChange} className="w-full bg-[#0a1122] border border-gray-700 rounded-lg px-4 py-3 text-white" placeholder="+27 12 345 6789" />
                      </div>
                      <div>
                        <label className="block text-sm font-medium mb-1">Your Message</label>
                        <textarea rows="4" name="message" required value={formData.message} onChange={handleChange} className="w-full bg-[#0a1122] border border-gray-700 rounded-lg px-4 py-3 text-white" placeholder="Tell me about your AI project..."></textarea>
                      </div>
                      <button type="submit" className="bg-[#2A9DF4] hover:bg-[#1f7bc0] py-3 rounded-xl font-bold text-white transition-all shadow-md mt-2 flex items-center justify-center gap-2"><i className="fas fa-paper-plane"></i> Send Message</button>
                      {submitted && <div className="text-green-400 text-center text-sm mt-2 animate-pulse">✓ Request sent! I'll respond within 24h.</div>}
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </section>
        );
      };

      // Footer
      const Footer = () => (
        <footer className="bg-[#050a15] py-8 border-t border-gray-800">
          <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4 text-sm text-gray-400">
            <div>© 2025 Aura Tech Intelligence. All rights reserved.</div>
            <div className="flex gap-6">
              <i className="fab fa-twitter hover:text-blue-300 cursor-pointer"></i>
              <i className="fab fa-linkedin hover:text-blue-300 cursor-pointer"></i>
              <i className="fab fa-github hover:text-blue-300 cursor-pointer"></i>
            </div>
            <div className="text-xs">✨ AI Solutions • Pretoria • eStudy Incubation Alumni</div>
          </div>
        </footer>
      );

      // Main App
      const App = () => {
        return (
          <div className="bg-[#0a0f1f]">
            <Header />
            <Hero />
            <Services />
            <About />
            <Pricing />
            <Contact />
            <Footer />
          </div>
        );
      };

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
```
