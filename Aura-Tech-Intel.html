    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', 'Space Grotesk', sans-serif;
        background-color: #0a0f1f;
        scroll-behavior: smooth;
      }

      /* Hero gradient */
      .hero-glow {
        background: radial-gradient(ellipse at 30% 40%, rgba(0, 180, 255, 0.12), rgba(2, 20, 45, 0.96));
        position: relative;
      }
      .hero-glow::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 70% 20%, rgba(0, 212, 255, 0.08), transparent 70%);
        pointer-events: none;
      }

      .animated-gradient-text {
        background: linear-gradient(135deg, #FFFFFF 20%, #2A9DF4 50%, #00D4FF 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: shimmer 3s infinite linear;
      }

      @keyframes shimmer {
        0% { background-position: 0% 50%; }
        100% { background-position: 100% 50%; }
      }

      .card-hover {
        transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      }
      .card-hover:hover {
        transform: translateY(-10px);
        box-shadow: 0 25px 40px -12px rgba(0, 180, 255, 0.3);
        border-color: rgba(0, 200, 255, 0.7);
        background: linear-gradient(145deg, #111d38, #0c142c);
      }

      .nav-blur {
        backdrop-filter: blur(16px);
        background: rgba(5, 10, 25, 0.92);
        border-bottom: 1px solid rgba(0, 150, 255, 0.3);
      }

      .pricing-popular {
        border: 1px solid #2A9DF4;
        box-shadow: 0 0 20px rgba(0, 150, 255, 0.35);
        transform: scale(1.02);
        background: linear-gradient(145deg, #0e1a2f, #091020);
      }

      .btn-glow {
        transition: all 0.2s ease;
      }
      .btn-glow:hover {
        box-shadow: 0 0 16px #00aeff;
        background: #0077cc;
        transform: translateY(-2px);
      }

      input, textarea {
        transition: 0.2s;
      }
      input:focus, textarea:focus {
        border-color: #2A9DF4;
        box-shadow: 0 0 0 3px rgba(42, 157, 244, 0.2);
        outline: none;
      }

      /* Fade-up animation for scroll */
      .fade-up {
        opacity: 0;
        transform: translateY(30px);
        transition: opacity 0.6s ease-out, transform 0.6s ease-out;
      }
      .fade-up.visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* Chat widget styles */
      .chat-widget {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 1000;
      }
      .chat-button {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #2A9DF4, #00b4ff);
        box-shadow: 0 4px 20px rgba(0, 180, 255, 0.5);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
      }
      .chat-button:hover {
        transform: scale(1.08);
        box-shadow: 0 6px 28px rgba(0, 180, 255, 0.7);
      }
      .chat-window {
        position: absolute;
        bottom: 80px;
        right: 0;
        width: 380px;
        height: 520px;
        background: #0f1a2e;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid rgba(42, 157, 244, 0.4);
        backdrop-filter: blur(8px);
      }
      .chat-header {
        background: linear-gradient(135deg, #0a1128, #0d1835);
        padding: 16px;
        color: white;
        font-weight: bold;
        border-bottom: 1px solid #2A9DF4;
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .message-bot {
        background: #1e2a48;
        padding: 10px 14px;
        border-radius: 18px;
        border-bottom-left-radius: 4px;
        max-width: 85%;
        color: #e0e0e0;
        font-size: 14px;
        align-self: flex-start;
        white-space: pre-wrap;
        line-height: 1.5;
      }
      .message-user {
        background: #2A9DF4;
        padding: 10px 14px;
        border-radius: 18px;
        border-bottom-right-radius: 4px;
        max-width: 85%;
        color: white;
        font-size: 14px;
        align-self: flex-end;
      }
      .chat-input-area {
        display: flex;
        padding: 12px;
        gap: 8px;
        border-top: 1px solid #2a3a60;
        background: #0a1128;
      }
      .chat-input-area input {
        flex: 1;
        background: #1e2a48;
        border: none;
        border-radius: 24px;
        padding: 10px 16px;
        color: white;
        outline: none;
      }
      .chat-input-area button {
        background: #2A9DF4;
        border: none;
        border-radius: 24px;
        padding: 8px 18px;
        color: white;
        cursor: pointer;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0b1120;
      }
      ::-webkit-scrollbar-thumb {
        background: #2A9DF4;
        border-radius: 8px;
      }
      .typing-indicator {
        display: inline-flex;
        gap: 4px;
        align-items: center;
      }
      .typing-indicator span {
        width: 6px;
        height: 6px;
        background: #aaa;
        border-radius: 50%;
        animation: blink 1.4s infinite;
      }
      .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
      .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes blink {
        0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
        30% { opacity: 1; transform: translateY(-4px); }
      }
      /* Logo styling */
      .logo-text {
        font-family: 'Space Grotesk', monospace;
        letter-spacing: -0.02em;
      }
      @media (max-width: 768px) {
        .chat-window {
          width: 320px;
          right: 0;
          bottom: 70px;
        }
      }
    </style>
  </head>
  <body class="text-gray-200">
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>

      // Header with proper mobile menu
      const Header = () => {
        const [isScrolled, setIsScrolled] = useState(false);

        useEffect(() => {
          const handleScroll = () => setIsScrolled(window.scrollY > 20);

        }, []);

          e.preventDefault();
          setMobileMenuOpen(false);

          const element = document.getElementById(targetId);
          if (element) element.scrollIntoView({ behavior: "smooth", block: "start" });
        };

        // Close menu when clicking outside
        useEffect(() => {
          const handleClickOutside = (e) => {
            if (mobileMenuOpen && !e.target.closest('.mobile-menu-container') && !e.target.closest('.mobile-menu-button')) {
              setMobileMenuOpen(false);
            }
          };
          document.addEventListener('click', handleClickOutside);
          return () => document.removeEventListener('click', handleClickOutside);

        return (

                onClick={(e) => { e.stopPropagation(); setMobileMenuOpen(!mobileMenuOpen); }}
              >
                <i className={`fas ${mobileMenuOpen ? 'fa-times' : 'fa-bars'}`}></i>

              {/* Mobile Menu Dropdown */}

      const HowItWorks = () => (
        <section id="howitworks" className="py-24 px-6 bg-[#0a0f1f]">

            <div className="text-center mb-14">
              <h2 className="text-4xl md:text-5xl font-bold">How <span className="text-[#2A9DF4]">It Works</span></h2>

        useEffect(() => {

            if (entry.isIntersecting) setVisible(true);
          }, { threshold: 0.1 });
          if (ref.current) observer.observe(ref.current);
          return () => observer.disconnect();

                    <h3 className="text-2xl font-bold mb-3">{agent.title}</h3>
                    <p className="text-gray-400 leading-relaxed">{agent.desc}</p>

                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      };

      // About Section - fixed to show current incubation
      const About = () => (
        <section id="about" className="py-24 px-6 bg-gradient-to-br from-[#0a1022] to-[#0d1428]">
          <div className="max-w-6xl mx-auto flex flex-col md:flex-row gap-12 items-center">
            <div className="md:w-1/3 flex justify-center">
              <div className="relative w-64 h-64 md:w-72 md:h-72 rounded-full bg-gradient-to-tr from-blue-500 to-cyan-400 p-1 shadow-2xl">
                <div className="w-full h-full rounded-full bg-[#111c30] flex items-center justify-center overflow-hidden border-4 border-white/10">

              <p className="text-gray-300">
                My mission: help South African businesses harness autonomous AI systems that handle repetitive cognitive work, freeing your team for strategic growth. From intelligent document processing to AI knowledge bases — I build agents that deliver measurable ROI.

              <div className="flex gap-4 pt-3 flex-wrap">
                <span className="bg-[#1e2a48] px-4 py-2 rounded-full text-sm flex items-center gap-2"><i className="fab fa-linkedin text-blue-400"></i> /in/lesedi-tlhapane</span>
                <span className="bg-[#1e2a48] px-4 py-2 rounded-full text-sm flex items-center gap-2"><i className="fas fa-phone-alt text-green-400"></i> 084-833-7335</span>

      // Engagement Models
      const Engagement = () => (
        <section id="pricing" className="py-24 px-6 bg-[#0a0f1f]">

            <div className="text-center mb-12">
              <h2 className="text-4xl md:text-5xl font-bold">Flexible <span className="text-[#2A9DF4]">Engagement Models</span></h2>

            </div>

        const getBotResponse = (userMessage) => {
          const msg = userMessage.toLowerCase();
          if (msg.match(/services|offer|do you do|what can you|agents|solutions/i)) {
            return "🤖 We build 3 types of AI digital workers:\n\n1️⃣ Customer Experience Agent — 24/7 support, appointment booking\n2️⃣ Operations & Admin Agent — Email monitoring, data extraction\n3️⃣ Knowledge Base Brain — Internal Q&A on your company data\n\nWhich one interests you?";

            return "💰 Pricing options:\n• Scoping & Consultation: From R3,500\n• Custom Agent Build: R8,000 – R45,000 (depends on complexity)\n• AI-as-a-Service Retainer: From R8,500/month\n\nWant a custom quote? Contact Lesedi directly at 084-833-7335!";

            return "🧠 Lesedi Tlhapane is an AI Technical Specialist based in Pretoria, currently in the eStudy AI Incubation Programme. He builds custom AI agents for South African businesses.";

        const handleSend = () => {
          if (!input.trim()) return;
          setMessages(prev => [...prev, { role: "user", content: input }]);
          const userQuestion = input;
          setInput("");
          setIsTyping(true);
          setTimeout(() => {
            setMessages(prev => [...prev, { role: "bot", content: getBotResponse(userQuestion) }]);
            setIsTyping(false);
          }, 500);
        };

        return (
          <div className="chat-widget">
            {isOpen && (
              <div className="chat-window">
                <div className="chat-header flex justify-between items-center">

                    <div key={idx} className={msg.role === "bot" ? "message-bot" : "message-user"}>
                      {msg.content.split('\n').map((line, i) => (<span key={i}>{line}<br /></span>))}
                    </div>
                  ))}
                  {isTyping && <div className="message-bot"><div className="typing-indicator"><span></span><span></span><span></span> Thinking...</div></div>}
                  <div ref={messagesEndRef} />
                </div>
                <div className="chat-input-area">
                  <input type="text" placeholder="Ask about AI agents, pricing..." value={input} onChange={(e) => setInput(e.target.value)} onKeyPress={(e) => e.key === "Enter" && handleSend()} />

                </div>
              </div>
            )}
